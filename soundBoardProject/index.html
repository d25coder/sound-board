<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
        <title>Sound Board</title>
        <link rel="stylesheet" href="style.css">       
    </head>
    <body>
        <main>
            <header>
                <h1>Nature Sound</h1>
                <p class="intro">Relax and unwind with these calming nature sounds.</p>
            </header>
            <section id="soundboard">
                <div class="status" aria-live="polite">Press A, S, D, F, G, or H to play a sound.</div>
                <ul class="keys">
                    <li data-key="a" class="key">
                        <kbd>A</kbd>
                        <span class="sound">Wind</span>
                    </li>
                    <li data-key="s" class="key">
                        <kbd>S</kbd>
                        <span class="sound">Rain</span>
                    </li>
                    <li data-key="d" class="key">
                        <kbd>D</kbd>
                        <span class="sound">Ocean</span>
                    </li>
                    <li data-key="f" class="key">
                        <kbd>F</kbd>
                        <span class="sound">Thunder</span>
                    </li>
                    <li data-key="g" class="key">
                        <kbd>G</kbd>
                        <span class="sound">Birds</span>
                    </li>
                    <li data-key="h" class="key">
                        <kbd>H</kbd>
                        <span class="sound">River</span>
                    </li>
                </ul>
            </section>
        </main>
        <script src="script.js"></script>
    </body>
</html>
