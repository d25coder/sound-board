<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Nature Soundboard</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main>
            <header>
                <h1>Nature Soundboard</h1>
                <p class="intro">Relax and unwind with calming nature sounds. Press A, S, D, F, G, or H, or click a tile.</p>
            </header>
            <section id="soundboard">
                <div class="status" aria-live="polite">Press A, S, D, F, G, or H to play a sound.</div>
                <ul class="keys">
                    <li data-key="a" class="key">
                        <kbd>A</kbd>
                        <span class="sound">Wind</span>
                    </li>
                    <li data-key="s" class="key">
                        <kbd>S</kbd>
                        <span class="sound">Rain</span>
                    </li>
                    <li data-key="d" class="key">
                        <kbd>D</kbd>
                        <span class="sound">Ocean</span>
                    </li>
                    <li data-key="f" class="key">
                        <kbd>F</kbd>
                        <span class="sound">Thunder</span>
                    </li>
                    <li data-key="g" class="key">
                        <kbd>G</kbd>
                        <span class="sound">Birds</span>
                    </li>
                    <li data-key="h" class="key">
                        <kbd>H</kbd>
                        <span class="sound">River</span>
                    </li>
                </ul>
            </section>
        </main>

        <audio data-key="a" src="sounds/wind.wav" preload="auto"></audio>
        <audio data-key="s" src="sounds/rain.wav" preload="auto"></audio>
        <audio data-key="d" src="sounds/ocean.wav" preload="auto"></audio>
        <audio data-key="f" src="sounds/thunder.wav" preload="auto"></audio>
        <audio data-key="g" src="sounds/birds.wav" preload="auto"></audio>
        <audio data-key="h" src="sounds/river.wav" preload="auto"></audio>

        <script src="script.js"></script>
    </body>
</html>
